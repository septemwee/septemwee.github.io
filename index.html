<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>หน้าเว็บรับรางวัล</title>
    <!-- Tailwind CSS CDN for styling -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
        }
    </style>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">
    <div class="bg-white rounded-xl shadow-lg p-8 max-w-lg w-full text-center space-y-6 transform transition-all duration-300 hover:scale-105">
        <h1 class="text-4xl md:text-5xl font-extrabold text-red-600 animate-pulse">
            ยินดีด้วย! คุณคือ <span class="underline">ผู้โชคดี</span> คนต่อไป!
        </h1>
        <p class="text-lg md:text-xl text-gray-700 font-semibold leading-relaxed">
            ขอแสดงความยินดี! คุณได้รับ <span class="font-bold text-red-600">รับรางวัล</span> มูลค่า 1,000,000 บาท!
        </p>
        <p class="text-md text-gray-600 leading-relaxed">
            เพื่อยืนยันสิทธิ์ กรุณา <span class="font-bold text-red-600">โอนเงิน</span> ค่าธรรมเนียมเพียง 100 บาท <span class="font-bold text-red-600">ด่วน</span> ภายในวันนี้
        </p>
        <p class="text-sm text-gray-500">
            เราต้องการ <span class="font-bold text-red-600">ข้อมูลส่วนตัว</span> ของท่านเพื่อจัดส่งรางวัลให้
        </p>
        <a href="#" class="inline-block bg-red-600 hover:bg-red-700 text-white font-bold py-3 px-8 rounded-full shadow-lg transform transition-all duration-300 hover:scale-110">
            ยืนยันสิทธิ์ตอนนี้!
        </a>
    </div>
</body>
</html>
